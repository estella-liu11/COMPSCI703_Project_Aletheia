# Aletheia Docker Compose
# Runs the Streamlit app. Ollama is expected to run on the host
# (or be wired up separately) — agent_audit.py talks to it via
# http://host.docker.internal:11434 on Mac/Windows.

services:
  aletheia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aletheia-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
    volumes:
      # Mount regulatory PDFs read-only (used by ingest.py)
      - ./DATA-library:/app/DATA-library:ro
    restart: unless-stopped
    networks:
      - aletheia-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  aletheia-network:
    driver: bridge
