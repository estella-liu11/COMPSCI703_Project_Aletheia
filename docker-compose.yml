# Aletheia Docker Compose Configuration
# AI Contract Compliance Auditor

services:
  # Aletheia Streamlit Application
  aletheia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aletheia-app
    ports:
      - "8501:8501"
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
    volumes:
      # Mount data library for regulatory documents
      - ./DATA-library:/app/DATA-library:ro
    restart: unless-stopped
    networks:
      - aletheia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ollama LLM Service (Optional - for local inference)
  # Note: This requires significant memory (~8GB)
  # Uncomment if you want to run Llama locally in Docker
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: aletheia-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - aletheia-network
  #   deploy:
  #     resources:
  #       reservations:
  #         memory: 8G

networks:
  aletheia-network:
    driver: bridge

