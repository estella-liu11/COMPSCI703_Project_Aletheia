# Aletheia CI/CD - Automated Testing
# Runs on every push and pull request

name: Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # Job 1: Python Security Tests
  security-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run security tests
        run: |
          python test_security.py

  # Job 2: Python Lint & Type Check
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install linting tools
        run: pip install ruff flake8

      - name: Run ruff linter
        run: |
          ruff check . || true

      - name: Run flake8
        run: |
          flake8 . --max-line-length=120 --ignore=E501,W503 || true

  # Job 3: Dependency Security Check
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run pip audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true
