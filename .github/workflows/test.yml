# Aletheia CI - Lint + Import Smoke Test
# Note: the full evaluation suite (test_evaluation.py) requires a reachable
# Pinecone index and a running Ollama server, so it is NOT run in CI.

name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint (ruff + flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install linters
        run: pip install ruff flake8

      - name: Ruff
        run: ruff check . || true

      - name: Flake8
        run: flake8 . --max-line-length=120 --ignore=E501,W503 || true

  import-smoke:
    name: Import smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate that test fixtures parse
        run: python test_data.py

      - name: Compile-check all Python files
        run: python -m compileall -q app.py agent_audit.py agent_audit_baseline.py ingest.py test_evaluation.py

  dep-audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true
